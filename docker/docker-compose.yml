services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file:
      - ../.env.example
    environment:
      - STORAGE_ROOT=/data/storage
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:8501
      - DATABASE_URL=postgresql+psycopg2://docgen:docgen@db:5432/docgen
    volumes:
      - ../storage:/data/storage
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    env_file:
      - ../.env.example
    environment:
      - STORAGE_ROOT=/data/storage
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://docgen:docgen@db:5432/docgen
    volumes:
      - ../storage:/data/storage
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501', timeout=2).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docgen
      POSTGRES_USER: docgen
      POSTGRES_PASSWORD: docgen
    ports:
      - "5432:5432"
    volumes:
      - docgen_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docgen -d docgen"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  docgen_pg:
